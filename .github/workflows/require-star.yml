name: Require Repository Star

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  check-star:
    runs-on: ubuntu-latest

    steps:
      - name: Check if contributor starred the repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          USER: ${{ github.event.pull_request.user.login }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

          echo "Repository: $OWNER/$REPO"
          echo "Contributor: $USER"

          PAGE=1
          FOUND=false

          while true; do
            echo "Checking page $PAGE..."

            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/stargazers?per_page=100&page=$PAGE")

            if echo "$RESPONSE" | jq -e '.message' >/dev/null 2>&1; then
              echo "$RESPONSE"
            USERS=$(curl -s "https://api.github.com/repos/$OWNER/$REPO/stargazers?per_page=100&page=$PAGE" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

            TYPE=$(echo "$USERS" | jq -r type 2>/dev/null || echo "error")

            if [ "$TYPE" != "array" ]; then
              STATUS=$(echo "$USERS" | jq -r .status 2>/dev/null)
              MESSAGE=$(echo "$USERS" | jq -r .message 2>/dev/null)
              if [ "$STATUS" = "403" ] || echo "$MESSAGE" | grep -iq "permission"; then
                echo "Warning: GitHub API returned a permission/unauthorized error (403). This usually means the repository is private or the workflow token does not have access to stargazers. Bypassing check..."
                echo "Response details: $MESSAGE"
                exit 0
              fi

              echo "Error: GitHub API returned an error response instead of an array. Response details:"
              echo "$USERS" | jq . 2>/dev/null || echo "$USERS"
              exit 1
            fi

            COUNT=$(echo "$RESPONSE" | jq 'length')

            if echo "$RESPONSE" | jq -e --arg USER "$USER" '.[] | select(.login==$USER)' >/dev/null; then
              FOUND=true
              break
            fi

            if [ "$COUNT" -lt 100 ]; then
              break
            fi

            PAGE=$((PAGE+1))
          done

          if [ "$FOUND" = true ]; then
            echo "Contributor has starred the repository."
            exit 0
          fi

          echo ""
          echo "========================================="
          echo "This repository requires contributors to"
          echo "star the repository before merging."
          echo ""
          echo "Please star:"
          echo "https://github.com/$OWNER/$REPO"
          echo "========================================="
          exit 1