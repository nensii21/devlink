name: Require Repository Star

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-star:
    runs-on: ubuntu-latest

    steps:
      - name: Check if contributor starred the repository
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          USER: ${{ github.event.pull_request.user.login }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          PAGE=1
          FOUND=false

          while true; do
            USERS=$(curl -s "https://api.github.com/repos/$OWNER/$REPO/stargazers?per_page=100&page=$PAGE" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

            TYPE=$(echo "$USERS" | jq -r type 2>/dev/null || echo "error")

            if [ "$TYPE" != "array" ]; then
              STATUS=$(echo "$USERS" | jq -r .status 2>/dev/null)
              MESSAGE=$(echo "$USERS" | jq -r .message 2>/dev/null)
              if [ "$STATUS" = "403" ] || echo "$MESSAGE" | grep -iq "permission"; then
                echo "Warning: GitHub API returned a permission/unauthorized error (403). This usually means the repository is private or the workflow token does not have access to stargazers. Bypassing check..."
                echo "Response details: $MESSAGE"
                exit 0
              fi

              echo "Error: GitHub API returned an error response instead of an array. Response details:"
              echo "$USERS" | jq . 2>/dev/null || echo "$USERS"
              exit 1
            fi

            COUNT=$(echo "$USERS" | jq length)

            if echo "$USERS" | jq -e --arg USER "$USER" '.[] | select(.login==$USER)' > /dev/null; then
              FOUND=true
              break
            fi

            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE+1))
          done

          if [ "$FOUND" = false ]; then
            echo " Please star the repository before your pull request can be merged."
            exit 1
          fi

          echo "Repository is starred."